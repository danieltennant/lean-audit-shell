name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Smoke test — version
        run: ./target/release/leash --version

      - name: Smoke test — c mode exit code
        run: ./target/release/leash -c "true"

      - name: Smoke test — c mode stdout
        run: |
          out=$(./target/release/leash -c "echo leash_smoke_test")
          echo "output: $out"
          echo "$out" | grep -q "leash_smoke_test"

      - name: Measure startup time (informational)
        run: |
          echo "=== leash --version ==="
          for i in 1 2 3; do
            /usr/bin/time -p ./target/release/leash --version 2>&1 | grep real
          done
          echo "=== leash -c true ==="
          for i in 1 2 3; do
            /usr/bin/time -p ./target/release/leash -c "true" 2>&1 | grep real
          done
